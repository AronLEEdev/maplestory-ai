<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>maplestory.ai — calibrate</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header>
      <h1>maplestory.ai calibrate</h1>
      <div id="step-indicator"></div>
      <div id="mode-toggle" title="Detection mode — yolo for smart targeting (capture+label+train), minimap-only for auto-maple style (no ML), replay for record-and-play (record once, bot replays the timeline)">
        <label>
          mode:
          <select id="mode-select">
            <option value="yolo" selected>YOLO (detect mobs)</option>
            <option value="none">minimap-only (no ML)</option>
            <option value="replay">replay (record-and-play)</option>
          </select>
        </label>
      </div>
    </header>

    <main>
      <section id="instruction">
        <p id="instr-text">Loading…</p>
        <p class="hint" id="instr-hint"></p>
      </section>

      <section id="canvas-area">
        <div id="zoom-toolbar">
          <button id="btn-zoom-out" title="Zoom out (-)">−</button>
          <button id="btn-zoom-in" title="Zoom in (+)">+</button>
          <button id="btn-zoom-fit" title="Fit (0)">fit</button>
          <button id="btn-zoom-1" title="100% (1)">1:1</button>
          <button id="btn-hand" title="Hand tool — drag to pan">✋ pan</button>
          <span class="zoom-hint">scroll=zoom · space/shift/middle-drag=pan · drag handles to resize</span>
        </div>
        <div id="canvas-wrap">
          <canvas id="cv"></canvas>
        </div>
      </section>

      <section id="state-panel">
        <div id="cursor-info">cursor: —</div>
        <div id="state-list"></div>
      </section>
    </main>

    <footer>
      <button id="btn-back" disabled>← Back</button>
      <button id="btn-clear">Clear last</button>
      <button id="btn-next">Next →</button>
      <button id="btn-save" disabled>Save</button>
      <button id="btn-cancel">Cancel</button>
    </footer>

    <script type="module" src="/static/canvas.js"></script>
  </body>
</html>
